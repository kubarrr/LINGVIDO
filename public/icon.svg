<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#C026D3"/>
    </linearGradient>
    <clipPath id="fc"><rect width="56" height="38" rx="7"/></clipPath>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Flags around the edge -->
  <!-- Spain (top) -->
  <g transform="translate(228,30)">
    <g clip-path="url(#fc)">
      <rect width="56" height="38" fill="#c60b1e"/>
      <rect y="9.5" width="56" height="19" fill="#ffc400"/>
    </g>
    <rect width="56" height="38" rx="7" fill="none" stroke="#fff" stroke-opacity="0.8" stroke-width="2.5"/>
  </g>
  <!-- France (upper right) -->
  <g transform="translate(366,100)">
    <g clip-path="url(#fc)">
      <rect width="18.7" height="38" fill="#0055a4"/>
      <rect x="18.7" width="18.6" height="38" fill="#ffffff"/>
      <rect x="37.3" width="18.7" height="38" fill="#ef4135"/>
    </g>
    <rect width="56" height="38" rx="7" fill="none" stroke="#fff" stroke-opacity="0.8" stroke-width="2.5"/>
  </g>
  <!-- Germany (lower right) -->
  <g transform="translate(366,280)">
    <g clip-path="url(#fc)">
      <rect width="56" height="12.7" fill="#111111"/>
      <rect y="12.7" width="56" height="12.7" fill="#dd0000"/>
      <rect y="25.3" width="56" height="12.7" fill="#ffce00"/>
    </g>
    <rect width="56" height="38" rx="7" fill="none" stroke="#fff" stroke-opacity="0.8" stroke-width="2.5"/>
  </g>
  <!-- Italy (lower left) -->
  <g transform="translate(90,280)">
    <g clip-path="url(#fc)">
      <rect width="18.7" height="38" fill="#009246"/>
      <rect x="18.7" width="18.6" height="38" fill="#ffffff"/>
      <rect x="37.3" width="18.7" height="38" fill="#ce2b37"/>
    </g>
    <rect width="56" height="38" rx="7" fill="none" stroke="#fff" stroke-opacity="0.8" stroke-width="2.5"/>
  </g>
  <!-- Japan (upper left) -->
  <g transform="translate(90,100)">
    <g clip-path="url(#fc)">
      <rect width="56" height="38" fill="#ffffff"/>
      <circle cx="28" cy="19" r="11" fill="#bc002d"/>
    </g>
    <rect width="56" height="38" rx="7" fill="none" stroke="#fff" stroke-opacity="0.8" stroke-width="2.5"/>
  </g>

  <!-- Camera in the centre -->
  <g transform="translate(0,-6)">
    <rect x="170" y="186" width="172" height="118" rx="26" fill="#ffffff"/>
    <rect x="206" y="168" width="50" height="26" rx="9" fill="#ffffff"/>
    <circle cx="256" cy="247" r="46" fill="url(#bg)"/>
    <circle cx="256" cy="247" r="46" fill="none" stroke="#7C3AED" stroke-width="3"/>
    <circle cx="256" cy="247" r="21" fill="#ffffff"/>
    <circle cx="312" cy="212" r="7" fill="#C026D3"/>
  </g>

  <!-- Wordmark -->
  <text x="256" y="450" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="1">Lingvido</text>
</svg>
